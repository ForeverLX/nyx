#!/usr/bin/nft -f
# vim:set ts=2 sw=2 et:

flush ruleset

table inet filter {
  # This set stores the IPs we want to ban
  set blackhole {
    type ipv4_addr
    flags timeout
  }

  chain input {
    type filter hook input priority filter; policy drop;

    # 1. DROP BANNED IPs IMMEDIATELY
    ip saddr @blackhole counter drop

    # 2. Allow established/related traffic
    ct state established,related accept

    # 3. Allow local loopback (Required for apps to talk to each other)
    iif "lo" accept

    # 4. ICMP (Ping) - Useful for troubleshooting
    ip protocol icmp accept

    # 5. Management Ports
    tcp dport { 2121, 2222 } accept        # SSH Ports
    tcp dport 9090 accept                 # Cockpit Web Console

    # 6. User Services & Dashboards
    tcp dport 8282 accept                 # Homepage
    tcp dport 19999 accept                # Netdata
    tcp dport 3000 accept                 # Gitea
    tcp dport 8080 accept                 # Vaultwarden
    
    # 7. DNS & Pi-hole (Found in your 'ss' output)
    tcp dport { 53, 80, 443, 8083 } accept
    udp dport { 53, 67, 123 } accept
  }

  chain forward {
    type filter hook forward priority filter; policy drop;
  }

  chain output {
    type filter hook output priority filter; policy accept;
  }
}
