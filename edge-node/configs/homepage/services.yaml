- Cerberus Threat Intel:
    - Suricata IDS:
        icon: /app/config/icons/suricata.svg
        href: https://netdata.lan
        description: Network Intrusion Detection
        widget:
          type: netdata
          url: http://host.containers.internal:19999
          node: "b-k3s"
          chart: "suricata.alerts"
    - Cowrie Honeypot:
        icon: /app/config/icons/cowrie.svg
        href: https://netdata.lan
        description: SSH/Telnet Deception Layer
        widget:
          type: customapi
          url: http://host.containers.internal:19999/api/v1/data?chart=container_cpu_usage.nightforge-cowrie&points=1&group=sum
          refreshInterval: 30000
          mappings:
            - field: data.0.0
              label: CPU %
              format: float
    - NightForge Shield:
        icon: /app/config/icons/shield.svg
        href: "#"
        description: Scan Queue — Phase 4

- Core Infrastructure:
    - Gitea:
        icon: /app/config/icons/gitea.png
        href: https://git.lan
        description: Private Git Server
        widget:
          type: gitea
          url: http://host.containers.internal:3000
          key: "4151a032eb61bd1e7d1e1de2bc3bb0d12ca3ccfb"
    - Vaultwarden:
        icon: /app/config/icons/vaultwarden.png
        href: https://vault.lan
        description: Password Management
    - Pi-hole:
        icon: /app/config/icons/pi-hole.png
        href: https://pihole.lan/admin
        description: Network DNS & Ad Block
    - Homepage:
        icon: /app/config/icons/homepage.png
        href: https://dash.lan
        description: This Dashboard

- Monitoring:
    - Netdata:
        icon: /app/config/icons/netdata.png
        href: https://netdata.lan
        description: Real-time System Metrics
        widget:
          type: netdata
          url: http://host.containers.internal:19999
          node: "b-k3s"
          chart: "system.cpu"
    - Pi-hole DNS:
        icon: /app/config/icons/pi-hole.png
        href: https://pihole.lan/admin
        description: DNS Query Statistics
